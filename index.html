<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector EPUB 3.0 Interactivo</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        :root {
            --bg-body: #121214;
            --bg-nav: #1a1a1e;
            --bg-sidebar: #202024;
            --text-main: #f0f0f5;
            --border-color: #2e2e34;
            --btn-bg: #2b2b30;
            --btn-hover: #3b3b42;
            --btn-text: #e0e0e5;
            --accent-purple: #7a3ee3;
        }

        [data-theme="light"] {
            --bg-body: #e4e4e7;
            --bg-nav: #ffffff;
            --bg-sidebar: #ffffff;
            --text-main: #18181b;
            --border-color: #d4d4d8;
            --btn-bg: #f0f0f3;
            --btn-hover: #e2e2e8;
            --btn-text: #18181b;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow: hidden;
            transition: background 0.3s ease;
        }

        #controls {
            padding: 10px 20px;
            background-color: var(--bg-nav);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .controls-group { display: flex; align-items: center; gap: 8px; }

        .btn, select {
            padding: 8px 14px;
            background-color: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--btn-text);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover, select:hover { background-color: var(--btn-hover); }

        .btn-audio {
            background-color: var(--accent-purple);
            color: #ffffff;
            border: none;
            font-weight: 600;
        }
        .btn-audio:hover { opacity: 0.9; transform: scale(1.02); }

        #main-container {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        #sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            padding: 20px;
            transition: transform 0.3s ease;
            position: absolute;
            height: 100%;
            z-index: 50;
            transform: translateX(-100%);
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
        }

        #sidebar.open { transform: translateX(0); }

        #toc-list { list-style: none; padding: 0; margin: 0; }
        #toc-list li {
            padding: 10px 8px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        #toc-list li:hover { background-color: var(--btn-bg); }

        #viewer-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background-color: var(--bg-body);
            width: 100%;
            height: 100%;
        }

        #book-wrapper {
            width: 100%;
            height: 100%;
            max-width: 900px;
            max-height: 90vh;
            background: transparent !important;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #viewer { 
            width: 100%; 
            height: 100%; 
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent !important;
        }

        #viewer iframe {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            background: transparent !important;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        #loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.95rem;
            color: var(--btn-text);
            z-index: 10;
        }
    </style>
</head>
<body>

    <nav id="controls">
        <div class="controls-group">
            <button id="toggle-sidebar" class="btn">☰ Índice</button>
            <button id="play-audio" class="btn btn-audio">▶ Reproducir Narración</button>
        </div>
        
        <div class="controls-group">
            <button id="theme-toggle" class="btn">🌓 Modo</button>
            <select id="view-mode">
                <option value="auto">Vista: Auto</option>
                <option value="single">1 Página</option>
                <option value="none">2 Páginas</option>
            </select>
            <button id="prev" class="btn">❮ Anterior</button>
            <button id="next" class="btn">Siguiente ❯</button>
        </div>
    </nav>
    
    <div id="main-container">
        <aside id="sidebar">
            <h3 style="margin-top:0">Contenido</h3>
            <ul id="toc-list"></ul>
        </aside>

        <main id="viewer-area">
            <div id="book-wrapper">
                <div id="loading-overlay">Cargando libro interactivo...</div>
                <div id="viewer"></div>
            </div>
        </main>
    </div>

    <!-- Reproductor de Audio HTML5 global oculto -->
    <audio id="global-audio-player"></audio>

    <script>
        let book, rendition;
        const audioPlayer = document.getElementById("global-audio-player");
        let smilMap = {}; // Mapa para almacenar relaciones XHTML -> SMIL/Audio

        window.addEventListener('DOMContentLoaded', () => {
            loadBook("little.epub");
        });

        document.getElementById("theme-toggle").onclick = () => {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        };

        document.getElementById("toggle-sidebar").onclick = () => {
            document.getElementById("sidebar").classList.toggle("open");
        };

        function loadBook(fileUrl) {
            if (rendition) rendition.destroy();
            document.getElementById("toc-list").innerHTML = "";
            
            book = ePub(fileUrl);
            
            rendition = book.renderTo("viewer", {
                width: "100%",
                height: "100%",
                flow: "paginated",
                manager: "default",
                allowScriptedContent: true,
                sandbox: "allow-same-origin allow-scripts allow-popups allow-forms allow-downloads"
            });

            // Ajuste visual
            rendition.hooks.content.register(function(contents) {
                contents.addStylesheetRules({
                    "html, body": { 
                        "height": "100% !important", 
                        "width": "100% !important",
                        "margin": "0 !important", 
                        "padding": "0 !important",
                        "background": "transparent !important",
                        "display": "flex !important",
                        "justify-content": "center !important",
                        "align-items": "center !important",
                        "overflow": "hidden !important"
                    },
                    "img, svg": {
                        "max-width": "100% !important",
                        "max-height": "100% !important",
                        "object-fit": "contain !important"
                    }
                });
            });

            rendition.display().then(() => {
                const loading = document.getElementById("loading-overlay");
                if (loading) loading.style.display = "none";
                rendition.resize();
            });

            // Cargar y mapear los manifiestos OPF y archivos SMIL cuando el libro se cargue
            book.loaded.resources.then(() => {
                parseSmilFiles();
            });

            // AL HACER CLIC EN "REPRODUCIR NARRACIÓN"
            document.getElementById("play-audio").onclick = () => {
                const btn = document.getElementById("play-audio");

                if (!audioPlayer.paused) {
                    audioPlayer.pause();
                    btn.textContent = "▶ Reproducir Narración";
                    return;
                }

                // Obtener el capitulo o pagina actual
                const currentLocation = rendition.currentLocation();
                if (!currentLocation || !currentLocation.start) return;

                const href = currentLocation.start.href.split('#')[0];
                
                // Buscar si la pagina tiene audio SMIL asociado o audio HTML5 interno
                playPageAudio(href);
            };

            // Al cambiar de página, detener la reproducción anterior
            rendition.on("relocated", () => {
                audioPlayer.pause();
                audioPlayer.src = "";
                document.getElementById("play-audio").textContent = "▶ Reproducir Narración";
            });

            // Construcción del Índice
            book.loaded.navigation.then(nav => {
                nav.toc.forEach(chapter => {
                    const li = document.createElement("li");
                    li.textContent = chapter.label;
                    li.onclick = () => { 
                        rendition.display(chapter.href); 
                        document.getElementById("sidebar").classList.remove("open"); 
                    };
                    document.getElementById("toc-list").appendChild(li);
                });
            });
        }

        // PARSEADOR PERSONALIZADO PARA EXTRAER AUDIO DE LOS ARCHIVOS .SMIL
        async function parseSmilFiles() {
            const manifest = book.packaging.manifest;
            
            for (let id in manifest) {
                const item = manifest[id];
                // Buscar elementos con media-overlay en la estructura
                if (item.overlay) {
                    const smilItem = manifest[item.overlay];
                    if (smilItem) {
                        try {
                            const url = await book.archive.url(smilItem.href);
                            const response = await fetch(url);
                            const text = await response.text();
                            
                            // Parsear el XML del archivo .smil
                            const parser = new DOMParser();
                            const xmlDoc = parser.parseFromString(text, "text/xml");
                            const audioNode = xmlDoc.querySelector("audio");

                            if (audioNode) {
                                let src = audioNode.getAttribute("src");
                                // Resolver ruta relativa del audio
                                const smilDir = smilItem.href.substring(0, smilItem.href.lastIndexOf("/") + 1);
                                const fullAudioPath = smilDir + src;
                                
                                // Mapear XHTML -> Ruta del Audio
                                smilMap[item.href] = fullAudioPath;
                            }
                        } catch (e) {
                            console.error("Error leyendo SMIL:", e);
                        }
                    }
                }
            }
        }

        // REPRODUCIR EL AUDIO ENCONTRADO EN LA PÁGINA
        async function playPageAudio(pageHref) {
            const btn = document.getElementById("play-audio");

            // 1. Verificar si tenemos una ruta mapeada desde los SMIL
            let audioPath = smilMap[pageHref];

            // Búsqueda alternativa por nombre si las rutas varían ligeramente
            if (!audioPath) {
                const cleanHref = pageHref.split('/').pop();
                for (let key in smilMap) {
                    if (key.includes(cleanHref)) {
                        audioPath = smilMap[key];
                        break;
                    }
                }
            }

            if (audioPath) {
                try {
                    // Obtener URL blob ejecutable desde el ZIP del EPUB
                    const audioBlobUrl = await book.archive.url(audioPath);
                    audioPlayer.src = audioBlobUrl;
                    audioPlayer.play();
                    btn.textContent = "⏸ Pausar Narración";

                    audioPlayer.onended = () => {
                        btn.textContent = "▶ Reproducir Narración";
                    };
                    return;
                } catch(err) {
                    console.error("Error al cargar el blob de audio:", err);
                }
            }

            // 2. Fallback: Buscar etiquetas <audio> estándar dentro del HTML de la página
            const contents = rendition.getContents()[0];
            if (contents) {
                const embeddedAudios = contents.document.querySelectorAll("audio");
                if (embeddedAudios.length > 0) {
                    const inlineAudio = embeddedAudios[0];
                    if (inlineAudio.paused) {
                        inlineAudio.play();
                        btn.textContent = "⏸ Pausar Narración";
                    } else {
                        inlineAudio.pause();
                        btn.textContent = "▶ Reproducir Narración";
                    }
                    return;
                }
            }

            alert("No se encontró ningún archivo de audio o narración SMIL vinculado a esta página.");
        }

        // Navegación
        document.getElementById("next").onclick = () => rendition?.next();
        document.getElementById("prev").onclick = () => rendition?.prev();
        
        document.getElementById("view-mode").onchange = () => {
            rendition?.spread(document.getElementById("view-mode").value);
            rendition?.resize();
        };

        window.addEventListener("resize", () => {
            if (rendition) rendition.resize();
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight") rendition?.next();
            if (e.key === "ArrowLeft") rendition?.prev();
        });
    </script>
</body>
</html>
