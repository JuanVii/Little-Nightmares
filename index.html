<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector EPUB 3.0 Interactivo</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        :root {
            --bg-body: #121214;
            --bg-nav: #1a1a1e;
            --bg-sidebar: #202024;
            --text-main: #f0f0f5;
            --border-color: #2e2e34;
            --btn-bg: #2b2b30;
            --btn-hover: #3b3b42;
            --btn-text: #e0e0e5;
            --accent-purple: #7a3ee3;
        }

        [data-theme="light"] {
            --bg-body: #e4e4e7;
            --bg-nav: #ffffff;
            --bg-sidebar: #ffffff;
            --text-main: #18181b;
            --border-color: #d4d4d8;
            --btn-bg: #f0f0f3;
            --btn-hover: #e2e2e8;
            --btn-text: #18181b;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow: hidden;
            transition: background 0.3s ease;
        }

        #controls {
            padding: 10px 20px;
            background-color: var(--bg-nav);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .controls-group { display: flex; align-items: center; gap: 8px; }

        .btn, select {
            padding: 8px 14px;
            background-color: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--btn-text);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover, select:hover { background-color: var(--btn-hover); }

        .btn-audio {
            background-color: var(--accent-purple);
            color: #ffffff;
            border: none;
            font-weight: 600;
        }
        .btn-audio:hover { opacity: 0.9; transform: scale(1.02); }

        #main-container {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        #sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            padding: 20px;
            transition: transform 0.3s ease;
            position: absolute;
            height: 100%;
            z-index: 50;
            transform: translateX(-100%);
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
        }

        #sidebar.open { transform: translateX(0); }

        #toc-list { list-style: none; padding: 0; margin: 0; }
        #toc-list li {
            padding: 10px 8px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        #toc-list li:hover { background-color: var(--btn-bg); }

        #viewer-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background-color: var(--bg-body);
            width: 100%;
            height: 100%;
        }

        #book-wrapper {
            width: 100%;
            height: 100%;
            max-width: 900px;
            max-height: 90vh;
            background: transparent !important;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #viewer { 
            width: 100%; 
            height: 100%; 
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent !important;
        }

        #viewer iframe {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            background: transparent !important;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        #loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-body);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.95rem;
            color: var(--btn-text);
            z-index: 10;
        }
    </style>
</head>
<body>

    <nav id="controls">
        <div class="controls-group">
            <button id="toggle-sidebar" class="btn">☰ Índice</button>
            <button id="play-audio" class="btn btn-audio">▶ Reproducir Narración</button>
        </div>
        
        <div class="controls-group">
            <button id="theme-toggle" class="btn">🌓 Modo</button>
            <select id="view-mode">
                <option value="auto">Vista: Auto</option>
                <option value="single">1 Página</option>
                <option value="none">2 Páginas</option>
            </select>
            <button id="prev" class="btn">❮ Anterior</button>
            <button id="next" class="btn">Siguiente ❯</button>
        </div>
    </nav>
    
    <div id="main-container">
        <aside id="sidebar">
            <h3 style="margin-top:0">Contenido</h3>
            <ul id="toc-list"></ul>
        </aside>

        <main id="viewer-area">
            <div id="book-wrapper">
                <div id="loading-overlay">Cargando libro interactivo...</div>
                <div id="viewer"></div>
            </div>
        </main>
    </div>

    <!-- Elemento de Audio Reproductor NATIVO -->
    <audio id="smil-audio-player" style="display:none;"></audio>

    <script>
        let book, rendition;
        const audioPlayer = document.getElementById("smil-audio-player");
        let smilAudioMap = {}; // Diccionario para guardar [página XHTML] -> [Ruta Audio]

        window.addEventListener('DOMContentLoaded', () => {
            loadBook("little.epub");
        });

        document.getElementById("theme-toggle").onclick = () => {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        };

        document.getElementById("toggle-sidebar").onclick = () => {
            document.getElementById("sidebar").classList.toggle("open");
        };

        function loadBook(fileUrl) {
            if (rendition) rendition.destroy();
            document.getElementById("toc-list").innerHTML = "";
            
            book = ePub(fileUrl);
            
            rendition = book.renderTo("viewer", {
                width: "100%",
                height: "100%",
                flow: "paginated",
                manager: "default",
                allowScriptedContent: true,
                sandbox: "allow-same-origin allow-scripts allow-popups allow-forms allow-downloads"
            });

            // Ajuste estético de centrado
            rendition.hooks.content.register(function(contents) {
                contents.addStylesheetRules({
                    "html, body": { 
                        "height": "100% !important", 
                        "width": "100% !important",
                        "margin": "0 !important", 
                        "padding": "0 !important",
                        "background": "transparent !important",
                        "display": "flex !important",
                        "justify-content": "center !important",
                        "align-items": "center !important",
                        "overflow": "hidden !important"
                    },
                    "img, svg": {
                        "max-width": "100% !important",
                        "max-height": "100% !important",
                        "object-fit": "contain !important"
                    }
                });
            });

            rendition.display().then(() => {
                const loading = document.getElementById("loading-overlay");
                if (loading) loading.style.display = "none";
                rendition.resize();
            });

            // Mapeo exhaustivo de archivos SMIL y manifiesto
            book.ready.then(() => {
                indexSmilFiles();
            });

            // CONTROL DE REPRODUCCIÓN AL HACER CLICK EN EL BOTÓN
            document.getElementById("play-audio").onclick = () => {
                const btn = document.getElementById("play-audio");

                if (!audioPlayer.paused) {
                    audioPlayer.pause();
                    btn.textContent = "▶ Reproducir Narración";
                    return;
                }

                playCurrentPageNarrative();
            };

            // Al cambiar de página
            rendition.on("relocated", () => {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
                document.getElementById("play-audio").textContent = "▶ Reproducir Narración";
            });

            // Construcción del Índice
            book.loaded.navigation.then(nav => {
                nav.toc.forEach(chapter => {
                    const li = document.createElement("li");
                    li.textContent = chapter.label;
                    li.onclick = () => { 
                        rendition.display(chapter.href); 
                        document.getElementById("sidebar").classList.remove("open"); 
                    };
                    document.getElementById("toc-list").appendChild(li);
                });
            });
        }

        // FUNCIÓN CLAVE: INDEXAR LOS ARCHIVOS .SMIL
        async function indexSmilFiles() {
            smilAudioMap = {};
            const manifest = book.packaging.manifest;
            
            for (let key in manifest) {
                const item = manifest[key];
                
                // Si el item del manifiesto es de tipo SMIL o termina en .smil
                if (item.type === "application/smil+xml" || (item.href && item.href.endsWith(".smil"))) {
                    try {
                        const url = await book.archive.url(item.href);
                        const response = await fetch(url);
                        const xmlText = await response.text();
                        
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(xmlText, "application/xml");
                        
                        // Buscar nodos de texto y de audio
                        const textNodes = xmlDoc.querySelectorAll("text");
                        const audioNodes = xmlDoc.querySelectorAll("audio");

                        if (textNodes.length > 0 && audioNodes.length > 0) {
                            // Extraer ruta de la página XHTML asociada
                            let xhtmlSrc = textNodes[0].getAttribute("src").split("#")[0];
                            // Extraer ruta del archivo de audio asociado
                            let audioSrc = audioNodes[0].getAttribute("src");

                            // Normalizar rutas relativas
                            const smilDir = item.href.substring(0, item.href.lastIndexOf("/") + 1);
                            
                            const fullXhtml = resolvePath(smilDir, xhtmlSrc);
                            const fullAudio = resolvePath(smilDir, audioSrc);

                            // Guardar en nuestro mapa
                            smilAudioMap[getFilename(fullXhtml)] = fullAudio;
                        }
                    } catch (e) {
                        console.error("Error al procesar archivo SMIL:", item.href, e);
                    }
                }
            }
        }

        // REPRODUCIR LA NARRACIÓN DE LA PÁGINA ACTUAL
        async function playCurrentPageNarrative() {
            const btn = document.getElementById("play-audio");
            const location = rendition.currentLocation();

            if (!location || !location.start) {
                alert("Cargando página...");
                return;
            }

            const currentHref = location.start.href;
            const currentFileName = getFilename(currentHref);

            // Buscar en el diccionario el audio indexado para esta página
            const audioPath = smilAudioMap[currentFileName];

            if (audioPath) {
                try {
                    // Obtener la URL del blob del audio desde la memoria del EPUB
                    const audioBlobUrl = await book.archive.url(audioPath);
                    audioPlayer.src = audioBlobUrl;
                    
                    await audioPlayer.play();
                    btn.textContent = "⏸ Pausar Narración";

                    audioPlayer.onended = () => {
                        btn.textContent = "▶ Reproducir Narración";
                    };
                } catch (err) {
                    console.error("Error reproduciendo el audio Blob:", err);
                    alert("No se pudo cargar el archivo de audio.");
                }
            } else {
                // Si no hay SMIL, buscar etiqueta <audio> nativa dentro del HTML de la página
                const contents = rendition.getContents()[0];
                if (contents) {
                    const inlineAudios = contents.document.querySelectorAll("audio");
                    if (inlineAudios.length > 0) {
                        inlineAudios[0].play();
                        btn.textContent = "⏸ Pausar Narración";
                        return;
                    }
                }
                alert("No hay un archivo de narración o audio SMIL configurado para esta página.");
            }
        }

        // Funciones auxiliares de rutas
        function resolvePath(base, relative) {
            const stack = base.split("/").filter(p => p.length > 0);
            stack.pop(); // remover el archivo actual
            const parts = relative.split("/");
            for (let part of parts) {
                if (part === ".") continue;
                if (part === "..") stack.pop();
                else stack.push(part);
            }
            return stack.join("/");
        }

        function getFilename(path) {
            if (!path) return "";
            return path.split('/').pop().split('#')[0];
        }

        // Navegación
        document.getElementById("next").onclick = () => rendition?.next();
        document.getElementById("prev").onclick = () => rendition?.prev();
        
        document.getElementById("view-mode").onchange = () => {
            rendition?.spread(document.getElementById("view-mode").value);
            rendition?.resize();
        };

        window.addEventListener("resize", () => {
            if (rendition) rendition.resize();
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight") rendition?.next();
            if (e.key === "ArrowLeft") rendition?.prev();
        });
    </script>
</body>
</html>
